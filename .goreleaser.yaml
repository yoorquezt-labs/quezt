version: 2
project_name: yqmev

builds:
  - id: yqmev
    main: ./cmd/yqmev
    binary: yqmev
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}

archives:
  - id: yqmev
    builds:
      - yqmev
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

brews:
  - name: yqmev
    repository:
      owner: yoorquezt-labs
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://yqmev.dev"
    description: "MEV terminal dashboard — monitor, analyze, and interact with YoorQuezt MEV infrastructure"
    license: "MIT"
    install: |
      bin.install "yqmev"
    test: |
      system "#{bin}/yqmev", "--version"

release:
  github:
    owner: yoorquezt-labs
    name: yqmev
  prerelease: auto
  name_template: "v{{.Version}}"
